<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FICHA FABULA ULTIMA - VERSÃO TXT</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #fff;
            color: #000;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            line-height: 1.4;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        details {
            border: 1px solid #000;
            margin-bottom: 15px;
        }
        summary {
            padding: 8px;
            background: #000;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            list-style: none;
        }
        summary::-webkit-details-marker { display: none; }
        .content {
            padding: 15px;
        }
        .field {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
        }
        label {
            font-weight: bold;
            margin-right: 10px;
            min-width: 180px;
        }
        input[type="text"], input[type="number"], textarea {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border: 1px solid #000;
            padding: 4px;
            flex-grow: 1;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            min-height: 80px;
            margin-top: 5px;
            resize: vertical;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .actions {
            margin-top: 40px;
            border-top: 3px double #000;
            padding-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 2px solid #000;
            background: #fff;
            padding: 10px 15px;
            cursor: pointer;
        }
        button:hover {
            background: #000;
            color: #fff;
        }
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            label { min-width: 100%; }
        }
    </style>
</head>
<body>

<h1>-- 📋 FICHA DE PERSONAGEM: FÁBULA ÚLTIMA (TXT STYLE) --</h1>

<details open>
    <summary>-- 01. INFORMAÇÕES DO PERSONAGEM --</summary>
    <div class="content">
        <div class="field">
            <label for="fName">Nome do Personagem:</label>
            <input type="text" id="fName" oninput="save()">
        </div>
        <div class="field">
            <label for="fPlayer">Nome do Jogador:</label>
            <input type="text" id="fPlayer" oninput="save()">
        </div>
        <div class="field">
            <label for="fIdent">Identidade:</label>
            <input type="text" id="fIdent" oninput="save()">
        </div>
        <div class="field">
            <label for="fTheme">Tema:</label>
            <input type="text" id="fTheme" oninput="save()">
        </div>
        <div class="field">
            <label for="fOrigin">Origem:</label>
            <input type="text" id="fOrigin" oninput="save()">
        </div>
        <div class="field">
            <label for="fLvl">Nível Total:</label>
            <input type="number" id="fLvl" value="5" oninput="save()">
        </div>
    </div>
</details>

<details open>
    <summary>-- 02. ATRIBUTOS E STATUS --</summary>
    <div class="content">
        <div class="grid-2">
            <div class="field"><label>DEX:</label><input type="text" id="fDex" placeholder="d8" oninput="save()"></div>
            <div class="field"><label>INS:</label><input type="text" id="fIns" placeholder="d8" oninput="save()"></div>
            <div class="field"><label>MIG:</label><input type="text" id="fMig" placeholder="d8" oninput="save()"></div>
            <div class="field"><label>WLP:</label><input type="text" id="fWlp" placeholder="d8" oninput="save()"></div>
        </div>
        <hr style="border:0; border-top:1px dashed #000; margin:15px 0;">
        <div class="grid-2">
            <div class="field"><label>PV (P. Vida):</label><input type="text" id="fPV" oninput="save()"></div>
            <div class="field"><label>PM (P. Mente):</label><input type="text" id="fPM" oninput="save()"></div>
            <div class="field"><label>IP (Inven.):</label><input type="text" id="fIP" oninput="save()"></div>
            <div class="field"><label>Zenit (Money):</label><input type="text" id="fZenit" oninput="save()"></div>
        </div>
    </div>
</details>

<details open>
    <summary>-- 03. DEFESAS E INICIATIVA --</summary>
    <div class="content grid-2">
        <div class="field"><label>Defesa:</label><input type="text" id="fDef" oninput="save()"></div>
        <div class="field"><label>Def. Mágica:</label><input type="text" id="fMDef" oninput="save()"></div>
        <div class="field"><label>Iniciativa:</label><input type="text" id="fInit" oninput="save()"></div>
    </div>
</details>

<details open>
    <summary>-- 04. CLASSES E HABILIDADES --</summary>
    <div class="content">
        <label for="fClasses">Classes:</label>
        <textarea id="fClasses" placeholder="Ex: Arcanista 2, Elementalista 3" oninput="save()"></textarea>
        <label for="fSkills" style="display:block; margin-top:15px;">Habilidades (Skills):</label>
        <textarea id="fSkills" oninput="save()"></textarea>
    </div>
</details>

<details>
    <summary>-- 05. EQUIPAMENTO --</summary>
    <div class="content">
        <textarea id="fEquip" oninput="save()"></textarea>
    </div>
</details>

<details>
    <summary>-- 06. HISTÓRIA E NOTAS --</summary>
    <div class="content">
        <label for="fHistory">História:</label>
        <textarea id="fHistory" oninput="save()"></textarea>
        <label for="fNotes" style="display:block; margin-top:15px;">Notas Adicionais:</label>
        <textarea id="fNotes" oninput="save()"></textarea>
    </div>
</details>

<div class="actions">
    <button onclick="exportTXT()">EXPORTAR (.TXT)</button>
    <button onclick="exportJSON()">EXPORTAR (.JSON)</button>
    <button onclick="document.getElementById('importFile').click()">IMPORTAR (.JSON)</button>
    <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
</div>

<script>
    const fieldIds = [
        'fName', 'fPlayer', 'fIdent', 'fTheme', 'fOrigin', 'fLvl',
        'fDex', 'fIns', 'fMig', 'fWlp', 'fPV', 'fPM', 'fIP',
        'fDef', 'fMDef', 'fInit', 'fZenit', 'fClasses', 'fSkills',
        'fEquip', 'fHistory', 'fNotes'
    ];

    function save() {
        const data = {};
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) data[id] = el.value;
        });
        localStorage.setItem('fu_txt_sheet', JSON.stringify(data));
    }

    function load() {
        const raw = localStorage.getItem('fu_txt_sheet');
        if (raw) {
            const data = JSON.parse(raw);
            fieldIds.forEach(id => {
                const el = document.getElementById(id);
                if (el && data[id] !== undefined) el.value = data[id];
            });
        }
    }

    function exportTXT() {
        let name = document.getElementById('fName').value || 'Personagem';
        let txt = `-- FICHA: ${name.toUpperCase()} --\n\n`;
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const label = document.querySelector(`label[for="${id}"]`)?.innerText || id.replace('f', '');
                txt += `${label.padEnd(20)} ${el.value}\n`;
            }
        });
        const blob = new Blob([txt], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Ficha_${name.replace(/\s+/g, '_')}.txt`;
        a.click();
    }

    function exportJSON() {
        const data = {};
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) data[id] = el.value;
        });
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Backup_Ficha.json`;
        a.click();
    }

    function importJSON(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            fieldIds.forEach(id => {
                const el = document.getElementById(id);
                if (el && data[id] !== undefined) el.value = data[id];
            });
            save();
        };
        reader.readAsText(file);
    }

    window.onload = load;
</script>

</body>
</html>
