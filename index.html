<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem - Fabula Ultima</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --accent-color: #e67e22;
            --border-color: #bdc3c7;
            --section-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--section-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid var(--accent-color);
        }

        h1, h2, h3 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            background: #fff;
        }

        .attribute-box {
            text-align: center;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .attribute-box select {
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            background: #eee;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #c0392b;
        }

        .inventory-table, .skills-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .inventory-table th, .skills-table th {
            background: var(--accent-color);
            color: white;
            padding: 10px;
            text-align: left;
        }

        .inventory-table td, .skills-table td {
            border-bottom: 1px solid var(--border-color);
            padding: 8px;
        }

        .btn-print {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
        }

        .btn-print:hover {
            background: #d35400;
        }

        @media print {
            .btn-print { display: none; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: 1px solid #000; width: 100%; max-width: none; }
        }

        /* Acessibilidade */
        input:focus, select:focus, textarea:focus {
            outline: 3px solid #3498db;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fabula Ultima - Ficha de Personagem</h1>
        <div class="grid-2">
            <div class="form-group">
                <label for="char-name">Nome do Personagem:</label>
                <input type="text" id="char-name" placeholder="Ex: Valerius">
            </div>
            <div class="form-group">
                <label for="player-name">Jogador:</label>
                <input type="text" id="player-name">
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label for="identity">Identidade:</label>
                <input type="text" id="identity" placeholder="Ex: Cavaleiro Errante">
            </div>
            <div class="form-group">
                <label for="theme">Tema:</label>
                <input type="text" id="theme" placeholder="Ex: Justiça">
            </div>
            <div class="form-group">
                <label for="origin">Origem:</label>
                <input type="text" id="origin" placeholder="Ex: Reino de Duncaia">
            </div>
        </div>
    </header>

    <section>
        <h2>Atributos Principais</h2>
        <div class="grid-2">
            <div class="grid-2">
                <div class="attribute-box">
                    <label for="destreza">DESTREZA (DES)</label>
                    <select id="destreza">
                        <option value="d6">d6</option>
                        <option value="d8">d8</option>
                        <option value="d10">d10</option>
                        <option value="d12">d12</option>
                    </select>
                </div>
                <div class="attribute-box">
                    <label for="intuicao">INTUIÇÃO (INT)</label>
                    <select id="intuicao">
                        <option value="d6">d6</option>
                        <option value="d8">d8</option>
                        <option value="d10">d10</option>
                        <option value="d12">d12</option>
                    </select>
                </div>
                <div class="attribute-box">
                    <label for="vigor">VIGOR (VIG)</label>
                    <select id="vigor">
                        <option value="d6">d6</option>
                        <option value="d8">d8</option>
                        <option value="d10">d10</option>
                        <option value="d12">d12</option>
                    </select>
                </div>
                <div class="attribute-box">
                    <label for="vontade">VONTADE (VON)</label>
                    <select id="vontade">
                        <option value="d6">d6</option>
                        <option value="d8">d8</option>
                        <option value="d10">d10</option>
                        <option value="d12">d12</option>
                    </select>
                </div>
            </div>
            <div>
                <div class="stats-row">
                    <div class="stat-item">
                        <label>PV Máx</label>
                        <div class="stat-value" id="pv-max">--</div>
                    </div>
                    <div class="stat-item">
                        <label>PM Máx</label>
                        <div class="stat-value" id="pm-max">--</div>
                    </div>
                    <div class="stat-item">
                        <label>PI Máx</label>
                        <div class="stat-value">6</div>
                    </div>
                </div>
                <p><small>* PV = VIG x 5 + Nível | PM = VON x 5 + Nível</small></p>
            </div>
        </div>
    </section>

    <section>
        <h2>Defesas e Bônus</h2>
        <div class="grid-3">
            <div class="attribute-box">
                <label for="defesa">DEFESA</label>
                <input type="number" id="defesa" value="0">
                <small>DES + Armadura</small>
            </div>
            <div class="attribute-box">
                <label for="def-mag">DEF. MÁGICA</label>
                <input type="number" id="def-mag" value="0">
                <small>INT + Armadura</small>
            </div>
            <div class="attribute-box">
                <label for="iniciativa">INICIATIVA</label>
                <input type="number" id="iniciativa" value="0">
                <small>DES + INT</small>
            </div>
        </div>
    </section>

    <section>
        <h2>Classes e Habilidades</h2>
        <textarea id="skills" rows="6" placeholder="Liste suas classes e habilidades principais aqui..."></textarea>
    </section>

    <section>
        <h2>Equipamento e Inventário</h2>
        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Atributos/Bônus</th>
                    <th>Custo/Peso</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
            </tbody>
        </table>
    </section>

    <button class="btn-print" onclick="window.print()">Gerar PDF / Imprimir Ficha</button>
</div>

<script>
    // Lógica simples para calcular PV e PM automaticamente
    function updateStats() {
        const vigor = parseInt(document.getElementById('vigor').value.replace('d', ''));
        const vontade = parseInt(document.getElementById('vontade').value.replace('d', ''));
        const nivel = 5; // Nível inicial padrão

        document.getElementById('pv-max').innerText = (vigor * 5) + nivel;
        document.getElementById('pm-max').innerText = (vontade * 5) + nivel;
    }

    document.querySelectorAll('select').forEach(select => {
        select.addEventListener('change', updateStats);
    });

    updateStats();
</script>

</body>
</html>
