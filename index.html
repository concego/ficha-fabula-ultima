<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábula Última - Ficha de Personagem</title>
    <style>
        :root { --bg: #ffffff; --txt: #1a1a1a; --acc: #0056b3; --focus: #ffbf47; --border: #000000; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--txt); background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--border); color: #fff; padding: 20px; text-align: center; border-bottom: 5px solid var(--acc); }
        main { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        
        details { border: 3px solid var(--border); margin-bottom: 15px; background: #f9f9f9; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; background: #eee; border-bottom: 2px solid var(--border); font-size: 1.2rem; }
        summary:hover, summary:focus { background: var(--focus); outline: none; }
        
        .box { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); font-size: 1.1rem; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: 4px solid var(--focus); }
        
        .stat-box { text-align: center; border: 3px solid var(--border); padding: 15px; background: #fff; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--acc); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        button { padding: 15px 25px; font-weight: bold; cursor: pointer; border: 3px solid #000; font-size: 1.1rem; flex: 1; min-width: 200px; }
        .btn-save { background: #28a745; color: #fff; }
        .btn-load { background: #17a2b8; color: #fff; }
        .btn-export { background: var(--acc); color: #fff; }

        .class-list { max-height: 300px; overflow-y: auto; border: 2px solid #000; padding: 10px; background: #fff; }
        .class-item { border-bottom: 1px solid #ccc; padding: 8px 0; }
        .tag { background: #000; color: #fff; padding: 2px 6px; font-size: 0.8rem; margin-right: 5px; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <h1>Fábula Última</h1>
    <p>Ficha de Personagem Oficial</p>
</header>

<main>
    <!-- Informações Básicas -->
    <details open>
        <summary>1. Informações do Herói</summary>
        <div class="box">
            <div class="grid">
                <div>
                    <label for="fName">Nome:</label>
                    <input type="text" id="fName" placeholder="Ex: Valerius">
                </div>
                <div>
                    <label for="fOrig">Identidade:</label>
                    <input type="text" id="fOrig" placeholder="Ex: Cavaleiro Errante">
                </div>
                <div>
                    <label for="fTrait">Tema:</label>
                    <input type="text" id="fTrait" placeholder="Ex: Justiça, Ambição...">
                </div>
                <div>
                    <label for="fDesc">Descrição Física:</label>
                    <input type="text" id="fDesc" placeholder="Ex: Alto, olhos azuis, capa vermelha">
                </div>
                <div>
                    <label for="fLvl">Nível:</label>
                    <input type="number" id="fLvl" value="5" min="5" max="50" onchange="calc()">
                </div>
            </div>
        </div>
    </details>

    <!-- Atributos e Status -->
    <details>
        <summary>2. Atributos e Defesas</summary>
        <div class="box">
            <div class="grid">
                <div>
                    <label for="fDex">Destreza (DEX):</label>
                    <select id="fDex" onchange="calc()">
                        <option value="6">d6</option>
                        <option value="8" selected>d8</option>
                        <option value="10">d10</option>
                        <option value="12">d12</option>
                    </select>
                </div>
                <div>
                    <label for="fIns">Intuição (INS):</label>
                    <select id="fIns" onchange="calc()">
                        <option value="6">d6</option>
                        <option value="8" selected>d8</option>
                        <option value="10">d10</option>
                        <option value="12">d12</option>
                    </select>
                </div>
                <div>
                    <label for="fMig">Vigor (MIG):</label>
                    <select id="fMig" onchange="calc()">
                        <option value="6">d6</option>
                        <option value="8" selected>d8</option>
                        <option value="10">d10</option>
                        <option value="12">d12</option>
                    </select>
                </div>
                <div>
                    <label for="fWlp">Vontade (WLP):</label>
                    <select id="fWlp" onchange="calc()">
                        <option value="6">d6</option>
                        <option value="8" selected>d8</option>
                        <option value="10">d10</option>
                        <option value="12">d12</option>
                    </select>
                </div>
            </div>

            <div class="grid" style="margin-top: 20px;">
                <div class="stat-box">
                    <label>PV Máximo</label>
                    <div id="vPv" class="stat-value">--</div>
                </div>
                <div class="stat-box">
                    <label>PM Máximo</label>
                    <div id="vPm" class="stat-value">--</div>
                </div>
                <div class="stat-box">
                    <label>Defesa</label>
                    <div id="vDef" class="stat-value">--</div>
                </div>
                <div class="stat-box">
                    <label>Defesa Mágica</label>
                    <div id="vMdef" class="stat-value">--</div>
                </div>
            </div>
        </div>
    </details>

    <!-- Classes e Habilidades -->
    <details>
        <summary>3. Classes e Habilidades</summary>
        <div class="box">
            <label for="classSearch">Pesquisar Classe (Segredos de Alancia):</label>
            <input type="text" id="classSearch" placeholder="Ex: Arcanista, Fúria..." onkeyup="filter()">
            
            <div id="classList" class="class-list" style="margin: 15px 0;">
                <!-- JS Populates -->
            </div>

            <label for="fClasses">Minhas Classes e Habilidades:</label>
            <textarea id="fClasses" rows="6" placeholder="Ex: Arcanista Nv.2 (Avatar Arcano), Espadachim Nv.3 (Golpe Veloz)"></textarea>
        </div>
    </details>

    <!-- Equipamento e Notas -->
    <details>
        <summary>4. Equipamento e Notas</summary>
        <div class="box">
            <label for="fInv">Equipamento e Itens:</label>
            <textarea id="fInv" rows="5" placeholder="Armas, armaduras e itens de mochila..."></textarea>
            
            <label for="fNotes" style="margin-top: 15px;">Notas de Aventura:</label>
            <textarea id="fNotes" rows="5" placeholder="Missões, PDMs e descobertas..."></textarea>
        </div>
    </details>

    <!-- Ações -->
    <div class="btn-group">
        <button class="btn-save" onclick="exportJSON()">💾 Salvar Personagem</button>
        <button class="btn-load" onclick="document.getElementById('importFile').click()">📂 Carregar Personagem</button>
        <button class="btn-export" onclick="exportTXT()">📄 Exportar para Texto</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
    </div>
</main>

<script>
    const CLASSES = [
        {n: "Arcanista", b: "Alancia", s: "Magia de Invocação e Avatares."},
        {n: "Atirador", b: "Alancia", s: "Ataques à distância com precisão."},
        {n: "Cantor", b: "Alancia", s: "Canções de suporte e buffs de grupo."},
        {n: "Comandante", b: "Alancia", s: "Ordens táticas e liderança em campo."},
        {n: "Dançarino", b: "Alancia", s: "Agilidade e efeitos mágicos rítmicos."},
        {n: "Elementalista", b: "Alancia", s: "Manipulação das forças da natureza."},
        {n: "Entropista", b: "Alancia", s: "Magia do caos e manipulação da sorte."},
        {n: "Espadachim", b: "Alancia", s: "Mestria em lâminas e combate próximo."},
        {n: "Espiritualista", b: "Alancia", s: "Conexão com almas e cura espiritual."},
        {n: "Fúria", b: "Alancia", s: "Poder bruto e ataques devastadores."},
        {n: "Guardião", b: "Alancia", s: "Defesa inabalável e proteção de aliados."},
        {n: "Ladino", b: "Alancia", s: "Furtividade, venenos e perícias."},
        {n: "Mestre de Feras", b: "Alancia", s: "Companheiros animais e instinto selvagem."},
        {n: "Orador", b: "Alancia", s: "Diplomacia e palavras de poder."},
        {n: "Quimerista", b: "Alancia", s: "Mimetismo de habilidades de monstros."},
        {n: "Sábio", b: "Alancia", s: "Conhecimento enciclopédico e análise."},
        {n: "Simbolista", b: "Alancia", s: "Runas e símbolos de proteção/ataque."},
        {n: "Floralista", b: "Natural", s: "Magia das flores e pólen tático."},
        {n: "Gourmet", b: "Natural", s: "Cozinha que fortalece o grupo."},
        {n: "Invocador", b: "Natural", s: "Chamar espíritos da terra e céu."},
        {n: "Piloto", b: "Techno", s: "Mestria em veículos e máquinas de guerra."},
        {n: "Mutante", b: "Techno", s: "Alterações corporais biotecnológicas."},
        {n: "Ás", b: "Techno", s: "Especialista em manobras e velocidade."}
    ];

    function filter() {
        const q = document.getElementById('classSearch').value.toLowerCase();
        const html = CLASSES.filter(c => c.n.toLowerCase().includes(q) || c.s.toLowerCase().includes(q))
            .map(c => `<div class="class-item"><span class="tag">${c.b}</span> <strong>${c.n}</strong>: ${c.s}</div>`)
            .join('');
        document.getElementById('classList').innerHTML = html;
    }

    function calc() {
        const lvl = parseInt(document.getElementById('fLvl').value) || 5;
        const mig = parseInt(document.getElementById('fMig').value);
        const wlp = parseInt(document.getElementById('fWlp').value);
        const dex = parseInt(document.getElementById('fDex').value);
        const ins = parseInt(document.getElementById('fIns').value);

        const pv = (mig * 5) + lvl;
        const pm = (wlp * 5) + lvl;

        document.getElementById('vPv').innerText = `${pv} (Crise: ${Math.floor(pv/2)})`;
        document.getElementById('vPm').innerText = pm;
        document.getElementById('vDef').innerText = dex;
        document.getElementById('vMdef').innerText = ins;
    }

    function exportTXT() {
        const n = document.getElementById('fName').value || "Herói";
        const txt = `
FICHA DE PERSONAGEM - FÁBULA ÚLTIMA
------------------------------------
NOME: ${n}
IDENTIDADE: ${document.getElementById('fOrig').value}
TEMA: ${document.getElementById('fTrait').value}
DESCRIÇÃO: ${document.getElementById('fDesc').value}
NÍVEL: ${document.getElementById('fLvl').value}

ATRIBUTOS:
- DEX: d${document.getElementById('fDex').value}
- INS: d${document.getElementById('fIns').value}
- MIG: d${document.getElementById('fMig').value}
- WLP: d${document.getElementById('fWlp').value}

STATUS:
- PV: ${document.getElementById('vPv').innerText}
- PM: ${document.getElementById('vPm').innerText}
- DEF: ${document.getElementById('vDef').innerText}
- MDEF: ${document.getElementById('vMdef').innerText}

CLASSES:
${document.getElementById('fClasses').value}

EQUIPAMENTO:
${document.getElementById('fInv').value}

NOTAS:
${document.getElementById('fNotes').value}
------------------------------------
        `.trim();
        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_${n.replace(/\s+/g, '_')}.txt`;
        a.click();
    }

    function exportJSON() {
        const data = {
            name: document.getElementById('fName').value,
            ident: document.getElementById('fOrig').value,
            theme: document.getElementById('fTrait').value,
            desc: document.getElementById('fDesc').value,
            lvl: document.getElementById('fLvl').value,
            dex: document.getElementById('fDex').value,
            ins: document.getElementById('fIns').value,
            mig: document.getElementById('fMig').value,
            wlp: document.getElementById('fWlp').value,
            classes: document.getElementById('fClasses').value,
            inv: document.getElementById('fInv').value,
            notes: document.getElementById('fNotes').value
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_${data.name || 'Heroi'}.json`;
        a.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const d = JSON.parse(e.target.result);
            document.getElementById('fName').value = d.name || '';
            document.getElementById('fOrig').value = d.ident || d.orig || '';
            document.getElementById('fTrait').value = d.theme || d.trait || '';
            document.getElementById('fDesc').value = d.desc || '';
            document.getElementById('fLvl').value = d.lvl || 5;
            document.getElementById('fDex').value = d.dex || 8;
            document.getElementById('fIns').value = d.ins || 8;
            document.getElementById('fMig').value = d.mig || 8;
            document.getElementById('fWlp').value = d.wlp || 8;
            document.getElementById('fClasses').value = d.classes || '';
            document.getElementById('fInv').value = d.inv || '';
            document.getElementById('fNotes').value = d.notes || '';
            calc();
        };
        reader.readAsText(file);
    }

    window.onload = () => {
        filter();
        calc();
    };
</script>

</body>
</html>
