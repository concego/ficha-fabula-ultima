<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Fábula Última - Edição Livre</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --txt: #000000; 
            --acc: #0056b3; 
            --focus: #ffbf47; 
            --border: #000000; 
            --section-bg: #fdfdfd;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: var(--txt); 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            max-width: 800px;
            margin: auto;
        }
        header { 
            border-bottom: 5px solid var(--border); 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            text-align: center;
        }
        h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        
        details { 
            border: 3px solid var(--border); 
            margin-bottom: 20px; 
            background: var(--section-bg); 
        }
        summary { 
            padding: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #eeeeee; 
            border-bottom: 2px solid var(--border); 
            font-size: 1.2rem;
            list-style: none;
            display: flex;
            align-items: center;
        }
        summary::-webkit-details-marker { display: none; }
        summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        details[open] summary::before {
            transform: rotate(90deg);
        }
        summary:focus { 
            outline: 4px solid var(--focus); 
            background: var(--focus); 
        }
        
        .content { padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px; 
            font-size: 1.1rem; 
        }
        input[type="text"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--border); 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            background: #ffffff; 
            color: #000000; 
            border-radius: 4px;
        }
        textarea { min-height: 120px; resize: vertical; }
        input:focus, textarea:focus { 
            outline: 4px solid var(--focus); 
            border-color: var(--acc);
        }
        
        .btn-group { 
            display: flex; 
            gap: 15px; 
            margin-top: 30px; 
            flex-wrap: wrap; 
        }
        button { 
            flex: 1; 
            padding: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 3px solid var(--border); 
            font-size: 1rem;
            background: #eeeeee;
            transition: background 0.2s;
            min-width: 150px;
        }
        button:hover { background: #dddddd; }
        button:focus { outline: 4px solid var(--focus); }
        .btn-save { background: #333333; color: #ffffff; }
        .btn-save:hover { background: #000000; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Fábula Última - Edição Livre</h1>
    <p>Preenchimento flexível (apenas texto) • Auto-salvamento ativado</p>
</header>

<main>
    <details open>
        <summary aria-controls="sec-ident">1. Identidade e Atributos</summary>
        <div id="sec-ident" class="content">
            <div class="grid">
                <div>
                    <label for="fName">Nome do Personagem:</label>
                    <input type="text" id="fName" oninput="save()" placeholder="Ex: Valerius" aria-label="Nome do Personagem">
                </div>
                <div>
                    <label for="fIdent">Identidade:</label>
                    <input type="text" id="fIdent" oninput="save()" placeholder="Ex: Cavaleiro das Rosas" aria-label="Identidade">
                </div>
                <div>
                    <label for="fTheme">Tema:</label>
                    <input type="text" id="fTheme" oninput="save()" placeholder="Ex: Justiça" aria-label="Tema">
                </div>
                <div>
                    <label for="fOrigin">Origem:</label>
                    <input type="text" id="fOrigin" oninput="save()" placeholder="Ex: Reinos de Ferro" aria-label="Origem">
                </div>
                <div>
                    <label for="fLevel">Nível:</label>
                    <input type="text" id="fLevel" oninput="save()" placeholder="Ex: 5" aria-label="Nível">
                </div>
            </div>
            
            <div class="grid" style="margin-top:20px">
                <div>
                    <label for="fDex">DEX (Destreza):</label>
                    <input type="text" id="fDex" oninput="save()" placeholder="Ex: d8" aria-label="Destreza">
                </div>
                <div>
                    <label for="fIns">INS (Intuição):</label>
                    <input type="text" id="fIns" oninput="save()" placeholder="Ex: d10" aria-label="Intuição">
                </div>
                <div>
                    <label for="fMig">MIG (Vigor):</label>
                    <input type="text" id="fMig" oninput="save()" placeholder="Ex: d6" aria-label="Vigor">
                </div>
                <div>
                    <label for="fWlp">WLP (Vontade):</label>
                    <input type="text" id="fWlp" oninput="save()" placeholder="Ex: d8" aria-label="Vontade">
                </div>
            </div>

            <div class="grid" style="margin-top:20px">
                <div>
                    <label for="fPV">Pontos de Vida (PV):</label>
                    <input type="text" id="fPV" oninput="save()" placeholder="Atual / Máximo" aria-label="Pontos de Vida">
                </div>
                <div>
                    <label for="fPM">Pontos de Mente (PM):</label>
                    <input type="text" id="fPM" oninput="save()" placeholder="Atual / Máximo" aria-label="Pontos de Mente">
                </div>
                <div>
                    <label for="fDef">Defesa:</label>
                    <input type="text" id="fDef" oninput="save()" placeholder="Ex: 10" aria-label="Defesa">
                </div>
                <div>
                    <label for="fMDef">Defesa Mágica:</label>
                    <input type="text" id="fMDef" oninput="save()" placeholder="Ex: 8" aria-label="Defesa Mágica">
                </div>
            </div>
        </div>
    </details>

    <details>
        <summary aria-controls="sec-classes">2. Classes e Habilidades</summary>
        <div id="sec-classes" class="content">
            <label for="fClasses">Descreva suas Classes e Níveis:</label>
            <textarea id="fClasses" oninput="save()" placeholder="Ex: Elementalista 2, Ladino 3..." aria-label="Classes e Níveis"></textarea>
            
            <label for="fSkills" style="margin-top:15px">Habilidades de Classe:</label>
            <textarea id="fSkills" oninput="save()" placeholder="Liste suas habilidades e descrições aqui..." aria-label="Habilidades de Classe"></textarea>
        </div>
    </details>

    <details>
        <summary aria-controls="sec-equip">3. Inventário e Equipamento</summary>
        <div id="sec-equip" class="content">
            <textarea id="fEquip" oninput="save()" placeholder="Armas, Armaduras, Acessórios e Itens consumíveis..." aria-label="Inventário e Equipamento"></textarea>
        </div>
    </details>

    <details>
        <summary aria-controls="sec-history">4. História e Notas</summary>
        <div id="sec-history" class="content">
            <label for="fHistory">História do Personagem:</label>
            <textarea id="fHistory" oninput="save()" placeholder="Breve biografia..." aria-label="História"></textarea>
            
            <label for="fNotes" style="margin-top:15px">Notas de Campanha:</label>
            <textarea id="fNotes" oninput="save()" placeholder="Lembretes, NPCs, missões..." aria-label="Notas"></textarea>
        </div>
    </details>

    <div class="btn-group">
        <button onclick="downloadJSON()" class="btn-save">📤 Baixar JSON</button>
        <button onclick="document.getElementById('uploadFile').click()">📥 Carregar JSON</button>
        <button onclick="downloadTXT()">📄 Baixar TXT</button>
        <input type="file" id="uploadFile" style="display:none" onchange="uploadJSON(event)" accept=".json">
    </div>
</main>

<script>
    const fields = [
        'fName', 'fIdent', 'fTheme', 'fOrigin', 'fLevel',
        'fDex', 'fIns', 'fMig', 'fWlp',
        'fPV', 'fPM', 'fDef', 'fMDef',
        'fClasses', 'fSkills', 'fEquip', 'fHistory', 'fNotes'
    ];

    function save() {
        const data = {};
        fields.forEach(id => {
            data[id] = document.getElementById(id).value;
        });
        localStorage.setItem('ficha_libre_data', JSON.stringify(data));
    }

    function load() {
        const raw = localStorage.getItem('ficha_libre_data');
        if (raw) {
            const data = JSON.parse(raw);
            fields.forEach(id => {
                if (data[id] !== undefined) {
                    document.getElementById(id).value = data[id];
                }
            });
        }
    }

    function downloadJSON() {
        const data = {};
        fields.forEach(id => {
            data[id] = document.getElementById(id).value;
        });
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        const name = document.getElementById('fName').value || 'Personagem';
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_${name.replace(/\s+/g, '_')}.json`;
        a.click();
    }

    function uploadJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                fields.forEach(id => {
                    if (data[id] !== undefined) {
                        document.getElementById(id).value = data[id];
                    }
                });
                save();
                alert('Ficha carregada com sucesso!');
            } catch (err) {
                alert('Erro ao carregar o arquivo JSON.');
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    function downloadTXT() {
        const name = document.getElementById('fName').value || 'Herói';
        let txt = `FICHA FÁBULA ÚLTIMA - EDICAO LIVRE\n`;
        txt += `====================================\n\n`;
        
        txt += `NOME: ${document.getElementById('fName').value}\n`;
        txt += `IDENTIDADE: ${document.getElementById('fIdent').value}\n`;
        txt += `TEMA: ${document.getElementById('fTheme').value}\n`;
        txt += `ORIGEM: ${document.getElementById('fOrigin').value}\n`;
        txt += `NÍVEL: ${document.getElementById('fLevel').value}\n\n`;
        
        txt += `ATRIBUTOS:\n`;
        txt += `DEX: ${document.getElementById('fDex').value} | INS: ${document.getElementById('fIns').value}\n`;
        txt += `MIG: ${document.getElementById('fMig').value} | WLP: ${document.getElementById('fWlp').value}\n\n`;
        
        txt += `STATUS:\n`;
        txt += `PV: ${document.getElementById('fPV').value} | PM: ${document.getElementById('fPM').value}\n`;
        txt += `DEFESA: ${document.getElementById('fDef').value} | DEF. MÁGICA: ${document.getElementById('fMDef').value}\n\n`;
        
        txt += `CLASSES E HABILIDADES:\n`;
        txt += `${document.getElementById('fClasses').value}\n\n`;
        txt += `DETALHES DAS HABILIDADES:\n`;
        txt += `${document.getElementById('fSkills').value}\n\n`;
        
        txt += `INVENTÁRIO:\n`;
        txt += `${document.getElementById('fEquip').value}\n\n`;
        
        txt += `HISTÓRIA:\n`;
        txt += `${document.getElementById('fHistory').value}\n\n`;
        
        txt += `NOTAS:\n`;
        txt += `${document.getElementById('fNotes').value}\n`;

        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_${name.replace(/\s+/g, '_')}.txt`;
        a.click();
    }

    window.onload = load;
</script>

</body>
</html>
