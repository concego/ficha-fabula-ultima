<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabula Ultima - Ficha FINAL (Acessível + TXT)</title>
    <style>
        :root { --bg: #ffffff; --txt: #1a1a1a; --acc: #0056b3; --focus: #ffbf47; --border: #000000; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--txt); background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--border); color: #fff; padding: 20px; text-align: center; border-bottom: 5px solid var(--acc); }
        nav { background: #f4f4f4; border-bottom: 3px solid var(--border); padding: 10px; position: sticky; top: 0; z-index: 100; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        nav a { padding: 12px 18px; background: #fff; border: 2px solid var(--border); color: var(--txt); text-decoration: none; font-weight: bold; }
        nav a:hover, nav a:focus { background: var(--focus); outline: 3px solid var(--border); }
        main { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        section { margin-bottom: 60px; border-top: 5px solid var(--border); padding-top: 30px; }
        h2 { border-left: 12px solid var(--acc); padding-left: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .box { border: 3px solid var(--border); padding: 20px; margin-bottom: 20px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); font-size: 1.1rem; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: 4px solid var(--focus); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button { padding: 15px 25px; font-weight: bold; cursor: pointer; border: 3px solid #000; font-size: 1.1rem; }
        .btn-primary { background: var(--acc); color: #fff; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-info { background: #17a2b8; color: #fff; }
        #vPv, #vPm { font-size: 2rem; font-weight: bold; color: var(--acc); }
        .card { border: 2px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .tag { background: #000; color: #fff; padding: 2px 6px; font-size: 0.8rem; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Ficha de RPG - Fábula Última</h1>
    <p>Versão Final Inclusiva (Acessível para NVDA/TalkBack)</p>
</header>

<nav aria-label="Menu de Navegação Rápida">
    <a href="#dados">Informações Gerais</a>
    <a href="#atributos">Atributos e Status</a>
    <a href="#classes-ref">Lista de Classes</a>
    <a href="#inventario">Inventário e Notas</a>
</nav>

<main>
    <section id="dados">
        <h2>Informações do Personagem</h2>
        <div class="grid">
            <div><label for="fName">Nome do Herói:</label><input type="text" id="fName" placeholder="Ex: Sir Anderson"></div>
            <div><label for="fPron">Pronomes:</label><input type="text" id="fPron" placeholder="Ex: Ele/Dele"></div>
        </div>
        <div class="grid" style="margin-top:20px">
            <div><label for="fOrig">Origem:</label><input type="text" id="fOrig" placeholder="Ex: Reino de Ferro"></div>
            <div><label for="fTrait">Traço (Trait):</label><input type="text" id="fTrait" placeholder="Ex: Guerreiro Cego"></div>
        </div>
    </section>

    <section id="atributos">
        <h2>Atributos Base</h2>
        <div class="grid">
            <div><label for="fDex">Destreza (DEX):</label><select id="fDex" onchange="calc()"><option value="6">d6</option><option value="8" selected>d8</option><option value="10">d10</option><option value="12">d12</option></select></div>
            <div><label for="fIns">Intuição (INS):</label><select id="fIns" onchange="calc()"><option value="6">d6</option><option value="8" selected>d8</option><option value="10">d10</option><option value="12">d12</option></select></div>
            <div><label for="fMig">Vigor (MIG):</label><select id="fMig" onchange="calc()"><option value="6">d6</option><option value="8" selected>d8</option><option value="10">d10</option><option value="12">d12</option></select></div>
            <div><label for="fWlp">Vontade (WLP):</label><select id="fWlp" onchange="calc()"><option value="6">d6</option><option value="8" selected>d8</option><option value="10">d10</option><option value="12">d12</option></select></div>
        </div>

        <div class="grid" style="margin-top:40px">
            <div class="box">
                <label>Pontos de Vida (PV)</label>
                <div id="vPv">--</div>
            </div>
            <div class="box">
                <label>Pontos de Mente (PM)</label>
                <div id="vPm">--</div>
            </div>
            <div class="box">
                <label for="fLvl">Nível Atual:</label>
                <input type="number" id="fLvl" value="5" min="5" max="50" onchange="calc()">
            </div>
        </div>
    </section>

    <section id="classes-ref">
        <h2>Referência de Classes (25+)</h2>
        <div style="margin-bottom:20px">
            <label for="classSearch">Buscar Classe:</label>
            <input type="text" id="classSearch" placeholder="Ex: Cantor, Mago..." onkeyup="filterClasses()">
        </div>
        <div id="classList" style="max-height: 400px; overflow-y: auto; border: 2px solid #000; padding: 15px;">
            <!-- Renderizado via JS -->
        </div>
    </section>

    <section id="inventario">
        <h2>Notas e Inventário</h2>
        <div class="box">
            <label for="fClasses">Classes Escolhidas e Habilidades:</label>
            <textarea id="fClasses" rows="5" placeholder="Liste aqui suas classes e níveis..."></textarea>
        </div>
        <div class="box">
            <label for="fNotes">Notas de Aventura:</label>
            <textarea id="fNotes" rows="8" placeholder="História, Vínculos, etc..."></textarea>
        </div>
    </section>

    <div class="btn-group">
        <button class="btn-success" onclick="exportTXT()">📄 Exportar Ficha (Legível - TXT)</button>
        <button class="btn-primary" onclick="exportJSON()">📤 Salvar Backup (JSON)</button>
        <button class="btn-info" onclick="document.getElementById('importFile').click()">📥 Carregar Backup</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
    </div>
</main>

<script>
    const DB = {
        classes: [
            {n: "Arcanista", b: "Core", s: "Invocação de Avatares Arcanos."},
            {n: "Elementalista", b: "Core", s: "Magia de Fogo, Gelo, Raio e Terra."},
            {n: "Mago Branco", b: "Core", s: "Cura, Barreira e Suporte."},
            {n: "Mago Negro", b: "Core", s: "Magia de Entropia e Dano."},
            {n: "Guardião", b: "Core", s: "Proteção de aliados e Defesa alta."},
            {n: "Ladino", b: "Core", s: "Ataques Furtivos e Gazuas."},
            {n: "Lorekeeper", b: "Core", s: "Conhecimento e suporte tático."},
            {n: "Mestre de Fitas", b: "Core", s: "Uso de chicotes e controle."},
            {n: "Mestre de Bestas", b: "Core", s: "Companheiro animal."},
            {n: "Orador", b: "Core", s: "Persuasão e buffs sociais."},
            {n: "Sabatista", b: "Core", s: "Combate desarmado e posturas."},
            {n: "Sharp-eye", b: "Core", s: "Precisão e ataques à distância."},
            {n: "Spiritist", b: "Core", s: "Magia espiritual e cura."},
            {n: "Wayfarer", b: "Core", s: "Exploração e sobrevivência."},
            {n: "Cantor (Chanter)", b: "High Fantasy", s: "Canções e Hinos de grupo."},
            {n: "Comandante (Commander)", b: "High Fantasy", s: "Ordens e estratégia militar."},
            {n: "Dançarino (Dancer)", b: "High Fantasy", s: "Esquiva e danças mágicas."},
            {n: "Simbolista (Symbolist)", b: "High Fantasy", s: "Escrita rúnica e símbolos."},
            {n: "Ás (Ace)", b: "Techno Fantasy", s: "Condução de veículos e máquinas."},
            {n: "Mutante (Mutant)", b: "Techno Fantasy", s: "Evoluções físicas adaptativas."},
            {n: "Piloto (Pilot)", b: "Techno Fantasy", s: "Combate com Mech/Veículo."},
            {n: "Atirador (Sharpshooter)", b: "Techno Fantasy", s: "Uso de armas de fogo."},
            {n: "Floralista (Floralist)", b: "Natural Fantasy", s: "Magia de Plantas e Pólen."},
            {n: "Gourmet", b: "Natural Fantasy", s: "Culinária que cura e bufa."},
            {n: "Invocador (Invoker)", b: "Natural Fantasy", s: "Chamar espíritos da natureza."},
            {n: "Necromante", b: "Bonus", s: "Controle sobre a morte e mortos-vivos."}
        ]
    };

    function filterClasses() {
        const q = document.getElementById('classSearch').value.toLowerCase();
        const list = document.getElementById('classList');
        list.innerHTML = DB.classes
            .filter(c => c.n.toLowerCase().includes(q) || c.s.toLowerCase().includes(q))
            .map(c => `
                <div class="card">
                    <span class="tag">${c.b}</span> <strong>${c.n}</strong><br>
                    <small>Habilidades: ${c.s}</small>
                </div>
            `).join('');
    }

    function calc() {
        const lvl = parseInt(document.getElementById('fLvl').value) || 5;
        const mig = parseInt(document.getElementById('fMig').value);
        const wlp = parseInt(document.getElementById('fWlp').value);
        const hp = (mig * 5) + lvl;
        const mp = (wlp * 5) + lvl;
        document.getElementById('vPv').innerText = `${hp} (Crise: ${Math.floor(hp/2)})`;
        document.getElementById('vPm').innerText = mp;
    }

    function exportTXT() {
        const n = document.getElementById('fName').value || "Herói";
        const content = `
FICHA DE PERSONAGEM - FÁBULA ÚLTIMA
------------------------------------
NOME: ${n}
PRONOMES: ${document.getElementById('fPron').value}
ORIGEM: ${document.getElementById('fOrig').value}
TRAÇO: ${document.getElementById('fTrait').value}
NÍVEL: ${document.getElementById('fLvl').value}

ATRIBUTOS:
- DEX: d${document.getElementById('fDex').value}
- INS: d${document.getElementById('fIns').value}
- MIG: d${document.getElementById('fMig').value}
- WLP: d${document.getElementById('fWlp').value}

STATUS:
- PV: ${document.getElementById('vPv').innerText}
- PM: ${document.getElementById('vPm').innerText}

CLASSES E HABILIDADES:
${document.getElementById('fClasses').value}

NOTAS:
${document.getElementById('fNotes').value}
------------------------------------
Gerado pelo Compêndio Anderson & Adri
        `.trim();
        
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_${n.replace(/\s+/g, '_')}.txt`;
        a.click();
    }

    function exportJSON() {
        const data = {
            name: document.getElementById('fName').value,
            pron: document.getElementById('fPron').value,
            orig: document.getElementById('fOrig').value,
            trait: document.getElementById('fTrait').value,
            lvl: document.getElementById('fLvl').value,
            dex: document.getElementById('fDex').value,
            ins: document.getElementById('fIns').value,
            mig: document.getElementById('fMig').value,
            wlp: document.getElementById('fWlp').value,
            classes: document.getElementById('fClasses').value,
            notes: document.getElementById('fNotes').value
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Ficha_Backup_${data.name || 'Heroi'}.json`;
        a.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            document.getElementById('fName').value = data.name || '';
            document.getElementById('fPron').value = data.pron || '';
            document.getElementById('fOrig').value = data.orig || '';
            document.getElementById('fTrait').value = data.trait || '';
            document.getElementById('fLvl').value = data.lvl || 5;
            document.getElementById('fDex').value = data.dex || '8';
            document.getElementById('fIns').value = data.ins || '8';
            document.getElementById('fMig').value = data.mig || '8';
            document.getElementById('fWlp').value = data.wlp || '8';
            document.getElementById('fClasses').value = data.classes || '';
            document.getElementById('fNotes').value = data.notes || '';
            calc();
            alert("Ficha carregada com sucesso!");
        };
        reader.readAsText(file);
    }

    window.onload = () => {
        filterClasses();
        calc();
    };
</script>

</body>
</html>
